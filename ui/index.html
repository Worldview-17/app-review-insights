<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Review Insights</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#0071e3', 600: '#0066cc', 700: '#0055aa' }
      }
    }
  }
}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  .skeleton { background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .evidence-row { transition: background 0.15s; }
  .evidence-row:hover { background: #f0f7ff; }
  .tab-active { border-bottom: 2px solid #0071e3; color: #0071e3; }
  .severity-high { background: #fef2f2; color: #dc2626; border-left: 3px solid #dc2626; }
  .severity-medium { background: #fffbeb; color: #d97706; border-left: 3px solid #d97706; }
  .severity-low { background: #f0fdf4; color: #16a34a; border-left: 3px solid #16a34a; }
  .priority-p0 { background: #fef2f2; color: #dc2626; font-weight: 600; }
  .priority-p1 { background: #fffbeb; color: #d97706; }
  .priority-p2 { background: #f0fdf4; color: #16a34a; }
  pre.code-block { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 16px; overflow-x: auto; font-size: 0.8rem; line-height: 1.5; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ================================================================== -->
<!-- Top Nav Bar                                                         -->
<!-- ================================================================== -->
<nav class="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">📱</span>
      <h1 class="text-lg font-bold text-gray-900 tracking-tight">App Review Insights</h1>
      <span class="hidden sm:inline text-xs bg-brand-100 text-brand-700 px-2 py-0.5 rounded-full font-medium">AI-Powered</span>
    </div>
    <a href="/api/data/cleaned_reviews" target="_blank"
       class="text-sm text-gray-500 hover:text-brand-500 transition-colors flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
      原始数据
    </a>
  </div>
</nav>

<!-- ================================================================== -->
<!-- Main Layout: Left Panel + Right Content                             -->
<!-- ================================================================== -->
<div class="max-w-7xl mx-auto px-6 py-6 flex flex-col lg:flex-row gap-6">

  <!-- LEFT PANEL — Control --------------------------------------------->
  <aside class="lg:w-80 shrink-0">
    <div class="lg:sticky lg:top-20 space-y-4">

      <!-- Input Card -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
        <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-3">🔍 开始分析</h2>
        <form id="analyze-form" autocomplete="off" class="space-y-3">
          <div>
            <label for="app-url" class="block text-xs font-medium text-gray-500 mb-1">App Store 链接</label>
            <input id="app-url" type="url" required
                   placeholder="https://apps.apple.com/us/app/.../id839285684"
                   class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-shadow" />
          </div>
          <button type="submit" id="submit-btn"
                  class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-[0.98]">
            <svg id="btn-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            <span id="btn-text">开始分析</span>
          </button>
        </form>
        <div id="status-msg" class="hidden mt-3 text-xs rounded-lg p-2.5"></div>
      </div>

      <!-- Quick Stats Card (populated after analysis) -->
      <div id="stats-card" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-5 fade-in">
        <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-3">📊 数据概览</h2>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-blue-50 rounded-lg p-3 text-center">
            <div id="stat-total" class="text-2xl font-bold text-blue-700">—</div>
            <div class="text-xs text-blue-600 mt-0.5">评论总数</div>
          </div>
          <div class="bg-green-50 rounded-lg p-3 text-center">
            <div id="stat-rating" class="text-2xl font-bold text-green-700">—</div>
            <div class="text-xs text-green-600 mt-0.5">平均评分</div>
          </div>
          <div class="bg-amber-50 rounded-lg p-3 text-center">
            <div id="stat-topics" class="text-2xl font-bold text-amber-700">—</div>
            <div class="text-xs text-amber-600 mt-0.5">发现主题</div>
          </div>
          <div class="bg-red-50 rounded-lg p-3 text-center">
            <div id="stat-issues" class="text-2xl font-bold text-red-700">—</div>
            <div class="text-xs text-red-600 mt-0.5">核心问题</div>
          </div>
        </div>
        <div class="mt-3 flex gap-2 text-xs">
          <span id="sentiment-bar-pos" class="bg-green-100 text-green-700 px-2 py-1 rounded">—</span>
          <span id="sentiment-bar-neu" class="bg-gray-100 text-gray-600 px-2 py-1 rounded">—</span>
          <span id="sentiment-bar-neg" class="bg-red-100 text-red-700 px-2 py-1 rounded">—</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- RIGHT PANEL — Results -------------------------------------------->
  <main class="flex-1 min-w-0">

    <!-- Empty State -->
    <div id="empty-state" class="flex flex-col items-center justify-center py-24 text-gray-400">
      <svg class="w-20 h-20 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      <p class="text-lg font-medium">输入 App Store 链接开始分析</p>
      <p class="text-sm mt-1">AI 将自动获取评论、发现主题并生成洞察报告</p>
    </div>

    <!-- Results Container (hidden initially) -->
    <div id="results-container" class="hidden space-y-6">

      <!-- Tabs -->
      <div class="flex gap-1 border-b border-gray-200 overflow-x-auto">
        <button onclick="switchTab('overview')" data-tab="overview" class="tab-btn tab-active px-4 py-2.5 text-sm font-medium whitespace-nowrap transition-colors">📊 概览</button>
        <button onclick="switchTab('topics')"   data-tab="topics"   class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-500 whitespace-nowrap transition-colors">🏷️ 主题分析</button>
        <button onclick="switchTab('insights')" data-tab="insights" class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-500 whitespace-nowrap transition-colors">💡 核心洞察</button>
        <button onclick="switchTab('prd')"      data-tab="prd"      class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-500 whitespace-nowrap transition-colors">📋 PRD</button>
        <button onclick="switchTab('tests')"    data-tab="tests"    class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-500 whitespace-nowrap transition-colors">✅ 测试用例</button>
      </div>

      <!-- Tab: Overview -->
      <div id="tab-overview" class="tab-content fade-in space-y-4">
        <div id="overview-content"></div>
      </div>

      <!-- Tab: Topics -->
      <div id="tab-topics" class="tab-content hidden fade-in space-y-4">
        <div id="topics-content"></div>
      </div>

      <!-- Tab: Insights -->
      <div id="tab-insights" class="tab-content hidden fade-in space-y-4">
        <div id="insights-content"></div>
      </div>

      <!-- Tab: PRD -->
      <div id="tab-prd" class="tab-content hidden fade-in space-y-4">
        <div id="prd-content"></div>
      </div>

      <!-- Tab: Tests -->
      <div id="tab-tests" class="tab-content hidden fade-in space-y-4">
        <div id="tests-content"></div>
      </div>

    </div>
  </main>
</div>

<!-- ================================================================== -->
<!-- Scripts                                                             -->
<!-- ================================================================== -->
<script>
// ── State ─────────────────────────────────────────────────────────────
let store = {
  summary: null,
  reviews: null,
  insights: null,
  prd: null,
  tests: null,
};

// ── DOM refs ─────────────────────────────────────────────────────────
const form = document.getElementById('analyze-form');
const btn = document.getElementById('submit-btn');
const btnText = document.getElementById('btn-text');
const btnIcon = document.getElementById('btn-icon');
const statusMsg = document.getElementById('status-msg');
const statsCard = document.getElementById('stats-card');
const emptyState = document.getElementById('empty-state');
const resultsContainer = document.getElementById('results-container');

// ── Tab Switching ────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('tab-active');
    b.classList.add('text-gray-500');
  });
  const content = document.getElementById('tab-' + name);
  const btn = document.querySelector('[data-tab="' + name + '"]');
  if (content) { content.classList.remove('hidden'); content.classList.add('fade-in'); }
  if (btn) { btn.classList.add('tab-active'); btn.classList.remove('text-gray-500'); }
}

// ── Loading / Error helpers ──────────────────────────────────────────
function setLoading(loading) {
  btn.disabled = loading;
  if (loading) {
    btnText.textContent = '分析中...';
    btnIcon.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>';
    statusMsg.classList.add('hidden');
  } else {
    btnText.textContent = '开始分析';
    btnIcon.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>';
  }
}

function showStatus(type, msg) {
  statusMsg.classList.remove('hidden');
  statusMsg.className = 'mt-3 text-xs rounded-lg p-2.5 ' + (
    type === 'success' ? 'bg-green-50 text-green-700 border border-green-200' :
    type === 'error'   ? 'bg-red-50 text-red-700 border border-red-200' :
                         'bg-blue-50 text-blue-700 border border-blue-200'
  );
  statusMsg.textContent = msg;
}

// ── API Wrappers ─────────────────────────────────────────────────────
async function apiPost(url, body) {
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.detail || data.message || '请求失败');
  return data;
}

async function apiGet(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('获取数据失败');
  return resp.json();
}

// ── Pipeline orchestration ───────────────────────────────────────────
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const url = document.getElementById('app-url').value.trim();
  if (!url) return;

  setLoading(true);
  showStatus('info', '⏳ 正在获取评论并执行 AI 分析，请耐心等待（约需 30-90 秒）...');

  try {
    // Step 1 — trigger full pipeline
    const result = await apiPost('/api/analyze', { app_store_url: url });
    if (!result.success) throw new Error(result.message || '分析失败');

    const pipelineOk = result.ai_pipeline && result.ai_pipeline.topics_count > 0;
    showStatus('success',
      pipelineOk
        ? `✅ 分析完成！${result.message}（清洗后 ${result.cleaned_count} 条，发现 ${result.ai_pipeline.topics_count} 个主题）`
        : `⚠️ 数据获取成功，但 AI 分析未完成。${result.message}`
    );

    // Step 2 — fetch result files in parallel
    const [summary, reviews, insights, prd, tests] = await Promise.allSettled([
      apiGet('/api/summary'),
      apiGet('/api/data/reviews_with_topics'),
      apiGet('/api/data/insights'),
      apiGet('/api/data/prd'),
      apiGet('/api/data/test_cases'),
    ]);

    store.summary  = summary.status  === 'fulfilled' ? summary.value  : null;
    store.reviews  = reviews.status  === 'fulfilled' ? reviews.value  : null;
    store.insights = insights.status === 'fulfilled' ? insights.value  : null;
    store.prd      = prd.status      === 'fulfilled' ? prd.value       : null;
    store.tests    = tests.status    === 'fulfilled' ? tests.value     : null;

    // Step 3 — render everything
    emptyState.classList.add('hidden');
    resultsContainer.classList.remove('hidden');
    statsCard.classList.remove('hidden');
    renderStats();
    renderOverview();
    renderTopics();
    renderInsights();
    renderPRD();
    renderTests();

  } catch (err) {
    showStatus('error', '❌ ' + err.message);
  } finally {
    setLoading(false);
  }
});

// ── Render: Stats Card ───────────────────────────────────────────────
function renderStats() {
  const s = store.summary;
  if (!s) return;

  if (s.reviews) {
    document.getElementById('stat-total').textContent = s.reviews.total;
    document.getElementById('stat-rating').textContent = s.reviews.avg_rating;
    document.getElementById('sentiment-bar-pos').textContent = '😊 ' + s.reviews.positive;
    document.getElementById('sentiment-bar-neu').textContent = '😐 ' + s.reviews.neutral;
    document.getElementById('sentiment-bar-neg').textContent = '😞 ' + s.reviews.negative;
  }
  if (s.insights) {
    document.getElementById('stat-topics').textContent = s.insights.total_topics;
    document.getElementById('stat-issues').textContent = s.insights.total_issues;
  }
}

// ── Render: Overview Tab ─────────────────────────────────────────────
function renderOverview() {
  const container = document.getElementById('overview-content');
  const s = store.summary;
  if (!s) { container.innerHTML = '<p class="text-gray-400 text-sm">暂无数据</p>'; return; }

  let html = '';

  // Rating distribution bar
  if (s.reviews) {
    const total = s.reviews.total || 1;
    const pPos = Math.round((s.reviews.positive / total) * 100);
    const pNeu = Math.round((s.reviews.neutral / total) * 100);
    const pNeg = Math.round((s.reviews.negative / total) * 100);
    html += `
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <h3 class="font-semibold text-gray-800 mb-4">📈 评分分布</h3>
      <div class="flex h-6 rounded-full overflow-hidden mb-2">
        <div style="width:${pPos}%" class="bg-green-400 flex items-center justify-center text-xs text-white font-medium">${pPos > 8 ? pPos+'%' : ''}</div>
        <div style="width:${pNeu}%" class="bg-gray-300 flex items-center justify-center text-xs text-white font-medium">${pNeu > 8 ? pNeu+'%' : ''}</div>
        <div style="width:${pNeg}%" class="bg-red-400 flex items-center justify-center text-xs text-white font-medium">${pNeg > 8 ? pNeg+'%' : ''}</div>
      </div>
      <div class="flex justify-between text-xs text-gray-500">
        <span>🟢 正面 (4-5★)</span><span>⚪ 中性 (3★)</span><span>🔴 负面 (1-2★)</span>
      </div>
    </div>`;
  }

  // AI Pipeline summary
  if (s.insights) {
    html += `
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <h3 class="font-semibold text-gray-800 mb-3">🤖 AI 分析概要</h3>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div class="bg-indigo-50 rounded-lg p-3">
          <div class="text-2xl font-bold text-indigo-700">${s.insights.total_topics}</div>
          <div class="text-xs text-indigo-500">动态发现主题</div>
        </div>
        <div class="bg-rose-50 rounded-lg p-3">
          <div class="text-2xl font-bold text-rose-700">${s.insights.total_issues}</div>
          <div class="text-xs text-rose-500">识别核心问题</div>
        </div>
        <div class="bg-orange-50 rounded-lg p-3">
          <div class="text-2xl font-bold text-orange-700">${s.insights.high_severity}</div>
          <div class="text-xs text-orange-500">高严重性问题</div>
        </div>
      </div>
      ${s.insights.topics && s.insights.topics.length ? `
      <div class="mt-3 flex flex-wrap gap-1.5">
        ${s.insights.topics.map(t => `<span class="bg-gray-100 text-gray-700 text-xs px-2 py-1 rounded-full">${escHtml(t)}</span>`).join('')}
      </div>` : ''}
    </div>`;
  }

  if (s.prd) {
    html += `
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <h3 class="font-semibold text-gray-800 mb-3">📋 PRD 产出</h3>
      <div class="flex items-center gap-4">
        <div class="bg-blue-50 rounded-lg p-3 text-center flex-1">
          <div class="text-2xl font-bold text-blue-700">${s.prd.total_requirements}</div>
          <div class="text-xs text-blue-500">需求条目</div>
        </div>
        <div class="bg-red-50 rounded-lg p-3 text-center flex-1">
          <div class="text-2xl font-bold text-red-700">${s.prd.p0_count}</div>
          <div class="text-xs text-red-500">P0 阻塞项</div>
        </div>
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

// ── Render: Topics Tab ───────────────────────────────────────────────
function renderTopics() {
  const container = document.getElementById('topics-content');
  const data = store.reviews;
  if (!data || !data.topics || !data.topics.length) {
    container.innerHTML = '<p class="text-gray-400 text-sm">暂无主题数据</p>';
    return;
  }

  const topicList = data.topics;
  const maxCount = Math.max(...topicList.map(t => t.count || 0), 1);

  // Build a review-id → review map for quick lookup
  const reviewMap = {};
  (data.reviews || []).forEach(r => { reviewMap[r.review_id] = r; });

  let html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
  topicList.forEach((t, i) => {
    const pct = Math.round(((t.count || 0) / maxCount) * 100);
    const barColor = ['bg-blue-400','bg-indigo-400','bg-violet-400','bg-purple-400','bg-pink-400','bg-cyan-400','bg-emerald-400','bg-amber-400'][i % 8];
    html += `
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
      <div class="flex items-start justify-between mb-2">
        <h4 class="font-semibold text-gray-800">${escHtml(t.label || 'Unclassified')}</h4>
        <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full shrink-0">${t.count} 条</span>
      </div>
      ${t.description ? `<p class="text-xs text-gray-500 mb-2">${escHtml(t.description)}</p>` : ''}
      <div class="w-full bg-gray-100 rounded-full h-2 mb-3">
        <div class="${barColor} h-2 rounded-full" style="width:${pct}%"></div>
      </div>
      <!-- Sample reviews for this topic -->
      <details class="group">
        <summary class="text-xs text-brand-500 cursor-pointer hover:underline">查看代表性评论 ▼</summary>
        <div class="mt-2 max-h-48 overflow-y-auto space-y-1.5 text-xs">`;
    const topicReviews = (data.reviews || []).filter(r => r.topic === t.label).slice(0, 8);
    topicReviews.forEach(r => {
      html += `<div class="bg-gray-50 rounded p-2"><span class="text-yellow-500">★${r.rating||'?'}</span> <span class="text-gray-600">${escHtml((r.content||'').substring(0, 150))}${(r.content||'').length>150?'…':''}</span></div>`;
    });
    html += `</div></details></div>`;
  });
  html += '</div>';

  container.innerHTML = html;
}

// ── Render: Insights Tab (core) ─────────────────────────────────────
function renderInsights() {
  const container = document.getElementById('insights-content');
  const data = store.insights;
  if (!data || !data.topics || !data.topics.length) {
    container.innerHTML = '<p class="text-gray-400 text-sm">暂无洞察数据 — AI 分析可能尚未完成</p>';
    return;
  }

  // Build review map for evidence lookup
  const reviewMap = {};
  if (store.reviews && store.reviews.reviews) {
    store.reviews.reviews.forEach(r => { reviewMap[r.review_id] = r; });
  }

  let html = '';
  let globalIssueIdx = 0;

  data.topics.forEach(topic => {
    const issues = topic.issues || [];
    if (!issues.length) return;

    html += `<div class="mb-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="bg-indigo-100 text-indigo-700 text-xs font-semibold px-2.5 py-1 rounded-full">${escHtml(topic.topic || 'Unknown')}</span>
        <span class="text-xs text-gray-400">${issues.length} 个问题</span>
      </div>`;

    issues.forEach(issue => {
      globalIssueIdx++;
      const sevClass = issue.severity === 'high' ? 'severity-high' : issue.severity === 'medium' ? 'severity-medium' : 'severity-low';
      const sevLabel = { high: '🔴 高', medium: '🟡 中', low: '🟢 低' }[issue.severity] || '⚪';
      const evidenceIds = issue.evidence || [];
      const evidenceReviews = evidenceIds.map(id => reviewMap[id]).filter(Boolean);

      html += `
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-3 ${sevClass}">
        <div class="p-4">
          <div class="flex items-start justify-between gap-3 mb-2">
            <h4 class="font-semibold text-gray-900">#${globalIssueIdx} ${escHtml(issue.issue || '未命名问题')}</h4>
            <span class="text-xs px-2 py-0.5 rounded-full font-medium shrink-0" style="background:inherit">${sevLabel}</span>
          </div>
          <p class="text-sm text-gray-600 mb-3">${escHtml(issue.summary || '')}</p>
          <div class="flex flex-wrap gap-3 text-xs text-gray-500">
            <span>📎 证据数: <strong>${issue.sample_count || evidenceIds.length}</strong></span>
            ${issue.avg_rating ? `<span>⭐ 均分: <strong>${issue.avg_rating}</strong></span>` : ''}
          </div>
        </div>
        ${evidenceIds.length ? `
        <details class="border-t border-gray-100 bg-gray-50/50">
          <summary class="px-4 py-2 text-xs text-brand-500 cursor-pointer hover:underline font-medium">
            📋 展开证据溯源（${evidenceIds.length} 条相关评论）
          </summary>
          <div class="px-4 pb-3 max-h-64 overflow-y-auto space-y-1">
            ${evidenceIds.slice(0, 20).map(id => {
              const r = reviewMap[id];
              return r ? `<div class="evidence-row bg-white rounded-md p-2 text-xs border border-gray-100">
                <span class="text-gray-400 font-mono">${escHtml(id)}</span>
                <span class="text-yellow-500 ml-1">★${r.rating||'?'}</span>
                <span class="text-gray-500 ml-2">${escHtml((r.content||'').substring(0, 200))}${(r.content||'').length>200?'…':''}</span>
              </div>` : `<div class="text-xs text-gray-400 p-1 font-mono">${escHtml(id)}</div>`;
            }).join('')}
            ${evidenceIds.length > 20 ? `<p class="text-xs text-gray-400 p-1">… 还有 ${evidenceIds.length - 20} 条</p>` : ''}
          </div>
        </details>` : ''}
      </div>`;
    });

    html += '</div>';
  });

  container.innerHTML = html || '<p class="text-gray-400 text-sm">暂无详细洞察</p>';
}

// ── Render: PRD Tab ──────────────────────────────────────────────────
function renderPRD() {
  const container = document.getElementById('prd-content');
  const data = store.prd;
  if (!data || !data.requirements || !data.requirements.length) {
    container.innerHTML = '<p class="text-gray-400 text-sm">暂无 PRD 数据</p>';
    return;
  }

  let html = '';
  data.requirements.forEach(req => {
    const priClass = req.priority === 'P0' ? 'priority-p0' : req.priority === 'P1' ? 'priority-p1' : 'priority-p2';
    html += `
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <div class="flex items-start justify-between gap-3 mb-2">
        <h4 class="font-semibold text-gray-900">
          <span class="text-xs text-gray-400 font-mono mr-1">${escHtml(req.req_id || '?')}</span>
          ${escHtml(req.title || '未命名需求')}
        </h4>
        <span class="text-xs px-2 py-0.5 rounded-full ${priClass}">${escHtml(req.priority || '?')}</span>
      </div>
      <p class="text-sm text-gray-600 mb-3">${escHtml(req.description || '')}</p>
      <div class="flex flex-wrap gap-2 text-xs">
        ${req.source_topic ? `<span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full">📂 ${escHtml(req.source_topic)}</span>` : ''}
        ${(req.trace_review_ids || []).length ? `<span class="bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">📎 追溯 ${req.trace_review_ids.length} 条评论</span>` : ''}
      </div>
      ${req.trace_review_ids && req.trace_review_ids.length ? `
      <details class="mt-2">
        <summary class="text-xs text-brand-500 cursor-pointer hover:underline">查看追溯 review_ids</summary>
        <div class="mt-1 text-xs font-mono text-gray-400">${req.trace_review_ids.map(id => escHtml(id)).join(', ')}</div>
      </details>` : ''}
    </div>`;
  });

  container.innerHTML = html;
}

// ── Render: Test Cases Tab ───────────────────────────────────────────
function renderTests() {
  const container = document.getElementById('tests-content');
  const data = store.tests;
  if (!data || !data.test_cases || !data.test_cases.length) {
    container.innerHTML = '<p class="text-gray-400 text-sm">暂无测试用例数据</p>';
    return;
  }

  let html = '';
  data.test_cases.forEach(tc => {
    html += `
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <div class="flex items-start justify-between gap-3 mb-2">
        <h4 class="font-semibold text-gray-900">
          <span class="text-xs text-gray-400 font-mono mr-1">${escHtml(tc.tc_id || '?')}</span>
          ${escHtml(tc.title || '未命名用例')}
        </h4>
        ${tc.linked_req_id ? `<span class="text-xs bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full">🔗 ${escHtml(tc.linked_req_id)}</span>` : ''}
      </div>
      ${tc.steps && tc.steps.length ? `
      <div class="bg-gray-50 rounded-lg p-3 mb-2">
        <p class="text-xs font-semibold text-gray-500 mb-1">测试步骤</p>
        <ol class="text-sm text-gray-700 space-y-1">${tc.steps.map(s => `<li class="ml-4 list-decimal">${escHtml(s)}</li>`).join('')}</ol>
      </div>` : ''}
      ${tc.expected_result ? `<p class="text-sm text-gray-600"><span class="font-medium">预期结果：</span>${escHtml(tc.expected_result)}</p>` : ''}
      ${tc.trace_review_ids && tc.trace_review_ids.length ? `
      <div class="mt-2 text-xs text-gray-400">📎 关联评论：${tc.trace_review_ids.map(id => escHtml(id)).join(', ')}</div>` : ''}
    </div>`;
  });

  container.innerHTML = html;
}

// ── Utility ──────────────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}
</script>

</body>
</html>
